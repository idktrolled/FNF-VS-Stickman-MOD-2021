name: build
on: [push]
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@main
      - name: setup java
        uses: actions/setup-java@main
        with:
          java-version: 11
          distribution: temurin
      - name: setup ndk
        uses: nttld/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r21e
      - name: setup haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.3
      - name: install libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install lime 7.9.0
          haxelib install openfl 9.1.0
          haxelib install flixel 4.10.0
          haxelib install flixel-addons 2.11.0
          haxelib install flixel-ui 2.4.0
          haxelib install hscript 2.4.0
          haxelib git polymod https://github.com/garfieldel/polymod
          haxelib install hxcpp 4.2.1
          haxelib install actuate 1.8.9
          haxelib install linc_luajit 0.0.7
          haxelib git extension-webm https://github.com/brusakas/extension-webm
          haxelib git faxe https://github.com/ashea-code/faxe
          haxelib git discord_rpc https://github.com/aidan63/linc_discord-rpc
      - name: setup android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      - name: compile
        run: haxelib run lime build android
      - name: upload artifact
        uses: actions/upload-artifact@main
        with:
          name: build
          path: export/release/android/bin/app/build/outputs/apk/debug/*.apk
